<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>বিদ্যাটিউব</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222d;
    --accent: #f5a623; --accent2: #e05c2a; --text: #f0ede8;
    --muted: #8a8799; --border: rgba(255,255,255,0.07); --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', 'Hind Siliguri', sans-serif; min-height: 100vh; }
  nav { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 18px; font-weight: 800; color: var(--text); }
  .logo-text span { color: var(--accent); }
  .search-bar { flex: 1; max-width: 500px; display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
  .search-bar input { flex: 1; background: none; border: none; outline: none; padding: 8px 16px; color: var(--text); font-family: inherit; font-size: 14px; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-btn { background: var(--surface2); border: none; padding: 8px 16px; color: var(--muted); cursor: pointer; font-size: 14px; border-left: 1px solid var(--border); transition: color 0.2s; }
  .search-btn:hover { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .ai-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 20px; padding: 7px 14px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
  .ai-btn:hover { opacity: 0.85; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6b5ea8, #3a7bd5); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; cursor: pointer; }
  .app-layout { display: flex; min-height: calc(100vh - 57px); }
  .sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-section { padding: 6px 16px 2px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(245,166,35,0.07); }
  .sidebar-item .icon { font-size: 18px; width: 20px; text-align: center; }
  .main { flex: 1; padding: 24px 20px; overflow-y: auto; }
  .categories { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.2s; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 16px; font-weight: 800; }
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; margin-bottom: 30px; }
  .video-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s, border-color 0.2s; }
  .video-card:hover { transform: translateY(-3px); border-color: rgba(245,166,35,0.3); }
  .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 32px; background: var(--surface2); }
  .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .video-card:hover .play-overlay { background: rgba(0,0,0,0.35); }
  .play-circle { width: 44px; height: 44px; border-radius: 50%; background: rgba(245,166,35,0.9); display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.2s; transform: scale(0.8); }
  .video-card:hover .play-circle { opacity: 1; transform: scale(1); }
  .play-triangle { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid #000; margin-left: 2px; }
  .card-info { padding: 12px; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .card-channel { font-weight: 600; }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
  .loading-spinner { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* VIDEO MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; width: 90%; max-width: 800px; overflow: hidden; }
  .modal-video { width: 100%; aspect-ratio: 16/9; }
  .modal-video iframe { width: 100%; height: 100%; border: none; }
  .modal-info { padding: 16px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-meta { font-size: 13px; color: var(--muted); }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; margin-top: -4px; }

  /* AI PANEL */
  .ai-panel { width: 320px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  .ai-panel-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .ai-logo { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .ai-title { font-weight: 800; font-size: 14px; }
  .ai-subtitle { font-size: 11px; color: var(--muted); }
  .ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 300px; max-height: 60vh; }
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble { max-width: 75%; padding: 10px 13px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
  .msg.bot .msg-bubble { background: var(--surface2); border-radius: 4px 16px 16px 16px; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border-radius: 16px 4px 16px 16px; font-weight: 600; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #6b5ea8, #3a7bd5); font-weight: 700; font-size: 11px; }
  .suggestions { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .suggest-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.15s; font-family: inherit; }
  .suggest-btn:hover { border-color: var(--accent); color: var(--accent); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 10px 13px; background: var(--surface2); border-radius: 4px 16px 16px 16px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  .ai-input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .ai-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; transition: border-color 0.2s; }
  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--muted); }
  .send-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-icon { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid #fff; margin-left: 2px; }
  .loading-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: shimmer 1.5s infinite; display: none; }
  .loading-bar.active { display: block; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @media (max-width: 900px) { .ai-panel { display: none; } .sidebar { width: 60px; } .sidebar-item span:not(.icon) { display: none; } .sidebar-section { display: none; } }
  @media (max-width: 600px) { .sidebar { display: none; } nav .search-bar { display: none; } }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div class="logo-text">বিদ্যা<span>টিউব</span></div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="ভিডিও খুঁজুন... (যেমন: গণিত, বিজ্ঞান, ইতিহাস)" />
    <button class="search-btn" onclick="doSearch()">🔍</button>
  </div>
  <div class="nav-right">
    <button class="ai-btn" onclick="focusAI()">✨ AI সহায়ক</button>
    <div class="avatar">র</div>
  </div>
</nav>

<div class="loading-bar" id="loadingBar"></div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-item active" onclick="loadVideos('বাংলাদেশ শিক্ষামূলক ভিডিও')"><span class="icon">🏠</span><span>হোম</span></div>
    <div class="sidebar-item" onclick="loadVideos('trending শিক্ষামূলক বাংলা')"><span class="icon">🔥</span><span>ট্রেন্ডিং</span></div>
    <div class="sidebar-section">বিষয়সমূহ</div>
    <div class="sidebar-item" onclick="loadVideos('গণিত শিক্ষা বাংলা')"><span class="icon">➕</span><span>গণিত</span></div>
    <div class="sidebar-item" onclick="loadVideos('পদার্থবিজ্ঞান বাংলা tutorial')"><span class="icon">🔬</span><span>বিজ্ঞান</span></div>
    <div class="sidebar-item" onclick="loadVideos('বাংলা সাহিত্য পাঠ')"><span class="icon">📖</span><span>বাংলা</span></div>
    <div class="sidebar-item" onclick="loadVideos('English grammar bangla tutorial')"><span class="icon">🌐</span><span>ইংরেজি</span></div>
    <div class="sidebar-item" onclick="loadVideos('বাংলাদেশ ইতিহাস শিক্ষা')"><span class="icon">🏛️</span><span>ইতিহাস</span></div>
    <div class="sidebar-item" onclick="loadVideos('programming bangla tutorial')"><span class="icon">💻</span><span>প্রোগ্রামিং</span></div>
  </aside>

  <main class="main">
    <div class="categories">
      <div class="chip active" onclick="setChip(this,'বাংলাদেশ শিক্ষামূলক ভিডিও')">সব</div>
      <div class="chip" onclick="setChip(this,'গণিত শিক্ষা বাংলা')">গণিত</div>
      <div class="chip" onclick="setChip(this,'পদার্থবিজ্ঞান বাংলা')">পদার্থবিজ্ঞান</div>
      <div class="chip" onclick="setChip(this,'রসায়ন বাংলা tutorial')">রসায়ন</div>
      <div class="chip" onclick="setChip(this,'জীববিজ্ঞান বাংলা')">জীববিজ্ঞান</div>
      <div class="chip" onclick="setChip(this,'বাংলা সাহিত্য')">বাংলা</div>
      <div class="chip" onclick="setChip(this,'English tutorial bangla')">ইংরেজি</div>
      <div class="chip" onclick="setChip(this,'ইতিহাস বাংলা')">ইতিহাস</div>
      <div class="chip" onclick="setChip(this,'Python programming bangla')">প্রোগ্রামিং</div>
    </div>

    <div class="section-header">
      <span class="section-title" id="sectionTitle">🔥 জনপ্রিয় ভিডিও</span>
    </div>
    <div id="videoGrid" class="video-grid"></div>
  </main>

  <div class="ai-panel">
    <div class="ai-panel-header">
      <div class="ai-logo">🤖</div>
      <div><div class="ai-title">AI শিক্ষক</div><div class="ai-subtitle">যেকোনো প্রশ্ন করো</div></div>
    </div>
    <div class="ai-messages" id="aiMessages">
      <div class="msg bot">
        <div class="msg-avatar">🤖</div>
        <div>
          <div class="msg-bubble">নমস্কার! আমি তোমার AI শিক্ষক। কোন বিষয়ে পড়তে চাও? 😊</div>
          <div class="suggestions">
            <button class="suggest-btn" onclick="sendSuggestion('ক্লাস ৯-১০ গণিত ভিডিও দেখাও')">📐 গণিত ভিডিও দেখাও</button>
            <button class="suggest-btn" onclick="sendSuggestion('পদার্থবিজ্ঞান সহজে বোঝার উপায়')">⚛️ পদার্থবিজ্ঞান বোঝার উপায়</button>
            <button class="suggest-btn" onclick="sendSuggestion('প্রোগ্রামিং কোথা থেকে শুরু করব?')">💻 প্রোগ্রামিং শুরু করব কীভাবে?</button>
          </div>
        </div>
      </div>
    </div>
    <div class="ai-input-area">
      <input class="ai-input" id="aiInput" type="text" placeholder="প্রশ্ন করো..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button class="send-btn" onclick="sendMessage()"><div class="send-icon"></div></button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-video"><iframe id="modalIframe" allowfullscreen></iframe></div>
    <div class="modal-info">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
    </div>
  </div>
</div>

<script>
const YT_KEY = 'AIzaSyBo9hK1E4R3tjtzXOI1xftLyS5TmvT4fw8';
const OR_KEY = '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';
let isAiLoading = false;

async function loadVideos(query) {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = `<div class="loading-spinner" style="grid-column:1/-1"><div class="spinner"></div>ভিডিও লোড হচ্ছে...</div>`;
  document.getElementById('loadingBar').classList.add('active');
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=12&key=${YT_KEY}&relevanceLanguage=bn`);
    const data = await res.json();
    if (!data.items || data.items.length === 0) { grid.innerHTML = '<p style="color:var(--muted);padding:20px">কোনো ভিডিও পাওয়া যায়নি।</p>'; return; }
    grid.innerHTML = data.items.map(item => `
      <div class="video-card" onclick="openVideo('${item.id.videoId}','${item.snippet.title.replace(/'/g,"\\'")}','${item.snippet.channelTitle.replace(/'/g,"\\'")}')">
        <div class="thumb-wrap">
          <img src="${item.snippet.thumbnails.medium.url}" alt="" loading="lazy"/>
          <div class="play-overlay"><div class="play-circle"><div class="play-triangle"></div></div></div>
        </div>
        <div class="card-info">
          <div class="card-title">${item.snippet.title}</div>
          <div class="card-meta">
            <span class="card-channel">${item.snippet.channelTitle}</span>
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    grid.innerHTML = '<p style="color:var(--muted);padding:20px">ভিডিও লোড করতে সমস্যা হচ্ছে।</p>';
  }
  document.getElementById('loadingBar').classList.remove('active');
}

function setChip(el, query) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sectionTitle').textContent = `📂 ${el.textContent}`;
  loadVideos(query);
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.getElementById('sectionTitle').textContent = `🔍 "${q}" এর ফলাফল`;
  loadVideos(q + ' শিক্ষামূলক বাংলা');
}

function openVideo(id, title, channel) {
  document.getElementById('modalIframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMeta').textContent = channel;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalIframe').src = '';
  }
}

function focusAI() { document.getElementById('aiInput').focus(); }
function sendSuggestion(text) { document.getElementById('aiInput').value = text; sendMessage(); }

function addUserMessage(text) {
  const msgs = document.getElementById('aiMessages');
  msgs.innerHTML += `<div class="msg user"><div class="msg-avatar">র</div><div class="msg-bubble">${text}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotMessage(text) {
  const msgs = document.getElementById('aiMessages');
  msgs.innerHTML += `<div class="msg bot"><div class="msg-avatar">🤖</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('aiMessages');
  msgs.innerHTML += `<div class="msg bot typing-msg"><div class="msg-avatar">🤖</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if (!text || isAiLoading) return;
  input.value = '';
  isAiLoading = true;
  addUserMessage(text);
  showTyping();
  document.getElementById('loadingBar').classList.add('active');
  try {
    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OR_KEY}` },
      body: JSON.stringify({
        model: 'google/gemini-flash-1.5', max_tokens: 1000,
        messages: [
          { role: 'system', content: 'তুমি বিদ্যাটিউব শিক্ষামূলক প্ল্যাটফর্মের AI সহায়ক। বাংলায় সংক্ষিপ্ত উত্তর দাও। ইমোজি ব্যবহার করো।' },
          { role: 'user', content: text }
        ]
      })
    });
    const data = await resp.json();
    document.querySelector('.typing-msg')?.remove();
    const reply = data.choices?.[0]?.message?.content || 'দুঃখিত, একটু পরে আবার চেষ্টা করো।';
    addBotMessage(reply);
    if (text.includes('ভিডিও') || text.includes('দেখাও')) {
      loadVideos(text + ' বাংলা শিক্ষামূলক');
      document.getElementById('sectionTitle').textContent = `🔍 "${text}" এর ভিডিও`;
    }
  } catch(e) {
    document.querySelector('.typing-msg')?.remove();
    addBotMessage('সংযোগে সমস্যা হচ্ছে। 🙏');
  }
  isAiLoading = false;
  document.getElementById('loadingBar').classList.remove('active');
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
loadVideos('বাংলাদেশ শিক্ষামূলক ভিডিও');
</script>
</body>
</html>
